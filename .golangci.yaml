version: "2"
run:
  timeout: 10m
linters:
  enable:
    # checks for pass []any as any in variadic func(...any)
    - asasalint
    # checks for dangerous unicode character sequences
    - bidichk
    # detects places where loop variables are copied
    - copyloopvar
    # code clone detection
    - dupl
    # checks for problematic error-wrapping code
    - errorlint
    # computes & checks the cognitive complexity of functions
    - gocognit
    # finds repeated strings that could be replaced by constant
    - goconst
    # does many different things
    - gocritic
    # computes t& checks the cyclomatic complexity of functions
    - gocyclo
    # checks for security problems
    - gosec
    # enforces consistent import aliases.
    - importas
    # reports long lines
    - lll
    # finds commonly misspelled english words in comments
    - misspell
    # reports ill-formed or insufficient nolint directives
    - nolintlint
    # does many things
    - revive
    # set of rules from staticcheck
    - staticcheck
    # remove unnecessary type conversions
    - unconvert
    # detects leading & trailing whitespace
    - whitespace
  settings:
    lll:
      # max line length, lines longer will be reported. Default is 120.
      # '\t' is counted as 1 character by default, and can be changed with the tab-width option
      line-length: 120
      # tab width in spaces. Default to 1.
      tab-width: 1
    revive:
      rules:
        - name: blank-imports
          disabled: true
    staticcheck:
      # SA1019: deprecation warnings. We use a deprecated logger all over the
      # place, for now.
      checks:
        - all
        - -SA1019
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - lll
        source: ^func Test_
      - linters:
          - goconst
        path: _test\.go
    paths:
      - internal/rest/versions/embed.go
      - internal/hidden/versions/embed.go
      - internal/private/versions/embed.go
      - cmd/load-testing-target-generator/data.go
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - internal/rest/versions/embed.go
      - internal/hidden/versions/embed.go
      - internal/private/versions/embed.go
      - cmd/load-testing-target-generator/data.go
      - third_party$
      - builtin$
      - examples$
